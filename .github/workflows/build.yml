name: Build All Platforms

on:
  push:
    tags: 
      - 'v*'              # 所有 v* tag 都会触发
  workflow_dispatch:      # 手动触发（用于测试）
    inputs:
      platforms:
        description: '选择要构建的平台 (all/windows/macos/android)'
        required: false
        default: 'all'

jobs:
  # ============================================================
  #  Windows 构建 (Flutter + MDK)
  # ============================================================
  build-windows:
    if: |
      (github.event_name == 'push' && !contains(github.ref, '-android') && !contains(github.ref, '-macos')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: 创建 .env 文件
        run: |
          cd ui/flutter_app
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_DEBUG=false
          EOF

      - name: Build Windows (Flutter)
        run: |
          cd ui/flutter_app
          flutter pub get
          flutter build windows --release

      - name: 整理发布产物
        shell: pwsh
        run: |
          mkdir release
          Copy-Item "ui\flutter_app\build\windows\x64\runner\Release\*" -Destination "release" -Recurse
          Compress-Archive -Path release\* -DestinationPath BovaPlayer-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BovaPlayer-Windows
          path: BovaPlayer-Windows.zip

  # ============================================================
  # ============================================================
  #  macOS 构建 (Flutter + MDK)
  # ============================================================
  build-macos:
    if: |
      (github.event_name == 'push' && !contains(github.ref, '-android') && !contains(github.ref, '-windows')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: 创建 .env 文件
        run: |
          cd ui/flutter_app
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_DEBUG=false
          EOF

      - name: Build macOS (Flutter)
        run: |
          cd ui/flutter_app
          flutter pub get
          flutter build macos --release

      - name: 创建 DMG
        run: |
          hdiutil create -volname "BovaPlayer" \
            -srcfolder ui/flutter_app/build/macos/Build/Products/Release/BovaPlayer.app \
            -ov -format UDZO \
            BovaPlayer-macOS.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BovaPlayer-macOS
          path: BovaPlayer-macOS.dmg

  # ============================================================
  #  Android 构建 (Flutter + Rust FFI)
  # ============================================================
  build-android:
    # 只在以下情况运行：
    # 1. tag 不包含 -windows 或 -macos
    # 2. 手动触发且选择了 android 或 all
    if: |
      (github.event_name == 'push' && !contains(github.ref, '-windows') && !contains(github.ref, '-macos')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'android'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ui/flutter_app/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 缓存 pub 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 创建 .env 文件
        run: |
          cd ui/flutter_app
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_DEBUG=false
          EOF

      - name: Flutter 依赖安装
        run: |
          cd ui/flutter_app
          # 只在必要时清理
          rm -rf build
          # 确保 local.properties 存在并包含正确的 Flutter SDK 路径
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          # 安装依赖
          flutter pub get
          # 显示实际安装的版本
          echo "=== 已安装的 media_kit 相关包版本 ==="
          flutter pub deps | grep media_kit || true

      - name: 修补 media_kit_video（添加 onSurfaceDestroyed 方法）
        run: |
          cd ui/flutter_app
          
          # 提取 pub cache 目录并通过 python 脚本精准修补
          python -c '
          import os, glob
          
          pub_cache = os.path.expanduser("~/.pub-cache")
          # 扩大搜索范围，避免因为 media_kit_video-1.3.1 带上了版本号后缀导致匹配不到
          search_pattern = os.path.join(pub_cache, "**", "VideoOutput.java")
          import glob
          files = glob.glob(search_pattern, recursive=True)
          
          for file_path in files:
              # 只处理 media_kit_video 模块下的该文件
              if "media_kit_video" not in file_path or "android" not in file_path:
                  continue
              print(f"检查文件: {file_path}")
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()
              
              if "onSurfaceDestroyed" in content:
                  print("✓ onSurfaceDestroyed 方法已存在")
                  continue
                  
              print(f"需要添加 onSurfaceDestroyed 方法到: {file_path}")
              
              # 1. 移除 public void onSurfaceCleanup() 紧邻上方的 @Override
              # 使用 replace 替换精确的方法签名
              import re
              content = re.sub(r"@Override\s+public void onSurfaceCleanup\(\)", "public void onSurfaceCleanup()", content)
              
              # 2. 在文件末尾的 } 前插入 onSurfaceDestroyed
              injection = "    public void onSurfaceDestroyed() {\n        onSurfaceCleanup();\n    }\n}"
              content = re.sub(r"}\s*$", injection, content)
              
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)
              
              print("✓ 已精准修复文件")
          '

      - name: 构建 APK
        run: |
          cd ui/flutter_app
          # 构建包含所有架构的通用 APK
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../../BovaPlayer-Android.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: BovaPlayer-Android
          path: BovaPlayer-Android.apk

  # ============================================================
  #  创建 Release（仅在推送 tag 时触发）
  # ============================================================
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && always()
    needs: [build-windows, build-macos, build-android]
    # 即使某些 job 被跳过也继续执行
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: 整理发布文件
        run: |
          mkdir -p release-files
          # 只复制存在的文件
          [ -f artifacts/BovaPlayer-Windows/BovaPlayer-Windows.zip ] && cp artifacts/BovaPlayer-Windows/BovaPlayer-Windows.zip release-files/ || echo "⚠️ Windows 构建不存在"
          [ -f artifacts/BovaPlayer-macOS/BovaPlayer-macOS.dmg ] && cp artifacts/BovaPlayer-macOS/BovaPlayer-macOS.dmg release-files/ || echo "⚠️ macOS 构建不存在"
          [ -f artifacts/BovaPlayer-Android/BovaPlayer-Android.apk ] && cp artifacts/BovaPlayer-Android/BovaPlayer-Android.apk release-files/ || echo "⚠️ Android 构建不存在"
          ls -la release-files/
          
      - name: 生成 Release 说明
        id: release_notes
        run: |
          TAG_NAME="${{ github.ref_name }}"
          
          # 获取 tag 的完整 message（包含多行）
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "${TAG_NAME}")
          
          # 开始构建 Release Notes
          NOTES="## BovaPlayer ${TAG_NAME}\n\n"
          
          # 添加 tag message（如果存在）
          if [ -n "$TAG_MESSAGE" ]; then
            NOTES="${NOTES}${TAG_MESSAGE}\n\n---\n\n"
          fi
          
          # 添加下载表格
          NOTES="${NOTES}### 📦 下载\n\n| 平台 | 文件 | 说明 |\n|------|------|------|\n"
          
          if [ -f release-files/BovaPlayer-Windows.zip ]; then
            NOTES="${NOTES}| 🪟 Windows | \`BovaPlayer-Windows.zip\` | 解压即用，包含 MPV 播放引擎 |\n"
          fi
          
          if [ -f release-files/BovaPlayer-macOS.dmg ]; then
            NOTES="${NOTES}| 🍎 macOS | \`BovaPlayer-macOS.dmg\` | 打开 DMG，拖入 Applications |\n"
          fi
          
          if [ -f release-files/BovaPlayer-Android.apk ]; then
            NOTES="${NOTES}| 🤖 Android | \`BovaPlayer-Android.apk\` | 支持所有架构（arm64/arm/x86） |\n"
          fi
          
          # 添加安装说明
          NOTES="${NOTES}\n### 📝 安装说明\n\n"
          
          if [ -f release-files/BovaPlayer-Android.apk ]; then
            NOTES="${NOTES}**Android:**\n"
            NOTES="${NOTES}1. 下载 \`BovaPlayer-Android.apk\`\n"
            NOTES="${NOTES}2. 在手机上安装（需要允许安装未知来源应用）\n"
            NOTES="${NOTES}3. 打开应用即可使用\n\n"
          fi
          
          if [ -f release-files/BovaPlayer-macOS.dmg ]; then
            NOTES="${NOTES}**macOS:**\n"
            NOTES="${NOTES}1. 下载并打开 \`BovaPlayer-macOS.dmg\`\n"
            NOTES="${NOTES}2. 将 BovaPlayer 拖入 Applications 文件夹\n"
            NOTES="${NOTES}3. 首次打开如提示\"已损坏\"，请在终端执行:\n"
            NOTES="${NOTES}   \`\`\`bash\n"
            NOTES="${NOTES}   xattr -cr /Applications/BovaPlayer.app\n"
            NOTES="${NOTES}   \`\`\`\n\n"
          fi
          
          if [ -f release-files/BovaPlayer-Windows.zip ]; then
            NOTES="${NOTES}**Windows:**\n"
            NOTES="${NOTES}1. 下载并解压 \`BovaPlayer-Windows.zip\`\n"
            NOTES="${NOTES}2. 运行 \`BovaPlayer.exe\`\n"
            NOTES="${NOTES}3. 无需安装，解压即用\n"
          fi
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BovaPlayer ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: release-files/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
